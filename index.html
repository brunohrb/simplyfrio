<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Simply Frio | Sistema de Gestão</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a2744">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Simply Frio">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">

  <link rel="stylesheet" href="css/style.css">
  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

<!-- ═══════════════════════════════════════════
     LOGIN SCREEN
═══════════════════════════════════════════ -->
<div id="login-screen">
  <div class="login-left">
    <svg class="snowflake-icon" width="120" height="120" viewBox="0 0 64 64" fill="none">
      <line x1="32" y1="4" x2="32" y2="60" stroke="#4a90d9" stroke-width="3" stroke-linecap="round"/>
      <line x1="4" y1="32" x2="60" y2="32" stroke="#4a90d9" stroke-width="3" stroke-linecap="round"/>
      <line x1="11" y1="11" x2="53" y2="53" stroke="#4a90d9" stroke-width="3" stroke-linecap="round"/>
      <line x1="53" y1="11" x2="11" y2="53" stroke="#4a90d9" stroke-width="3" stroke-linecap="round"/>
      <line x1="32" y1="12" x2="26" y2="18" stroke="#4a90d9" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="32" y1="12" x2="38" y2="18" stroke="#4a90d9" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="32" y1="52" x2="26" y2="46" stroke="#4a90d9" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="32" y1="52" x2="38" y2="46" stroke="#4a90d9" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="12" y1="32" x2="18" y2="26" stroke="#4a90d9" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="12" y1="32" x2="18" y2="38" stroke="#4a90d9" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="52" y1="32" x2="46" y2="26" stroke="#4a90d9" stroke-width="2.5" stroke-linecap="round"/>
      <line x1="52" y1="32" x2="46" y2="38" stroke="#4a90d9" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="32" cy="32" r="4" fill="#4a90d9"/>
    </svg>
    <div style="text-align:center">
      <h1 style="font-size:46px;font-weight:800;letter-spacing:8px;color:white;margin-bottom:8px">SIMPLY FRIO</h1>
      <p style="color:#8892a4;letter-spacing:3px;font-size:15px">Elegância em cada estação</p>
    </div>
    <div style="display:flex;gap:36px;margin-top:16px">
      <div style="text-align:center">
        <div style="width:6px;height:6px;border-radius:50%;background:#4a90d9;margin:0 auto 8px"></div>
        <span style="color:#8892a4;font-size:13px">Aluguel</span>
      </div>
      <div style="text-align:center">
        <div style="width:6px;height:6px;border-radius:50%;background:#4a90d9;margin:0 auto 8px"></div>
        <span style="color:#8892a4;font-size:13px">Estilo</span>
      </div>
      <div style="text-align:center">
        <div style="width:6px;height:6px;border-radius:50%;background:#4a90d9;margin:0 auto 8px"></div>
        <span style="color:#8892a4;font-size:13px">Qualidade</span>
      </div>
    </div>
  </div>

  <div class="login-right">
    <div class="login-box">
      <h2>Bem-vinda de volta</h2>
      <p class="subtitle">Acesse o sistema Simply Frio</p>

      <div id="login-error" class="login-error"></div>

      <form id="login-form">
        <div class="form-group" style="margin-bottom:14px">
          <label class="form-label" style="display:block;margin-bottom:6px">Usuário</label>
          <input class="sf-input" id="login-user" type="text" placeholder="admin ou user" autocomplete="username" required>
        </div>
        <div class="form-group" style="margin-bottom:20px">
          <label class="form-label" style="display:block;margin-bottom:6px">Senha</label>
          <div style="position:relative">
            <input class="sf-input" id="login-pass" type="password" placeholder="••••••" autocomplete="current-password" style="padding-right:40px" required>
            <button type="button" id="toggle-pass" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:16px">👁</button>
          </div>
        </div>
        <button type="submit" id="btn-login" class="btn-primary" style="width:100%;justify-content:center;padding:12px;font-size:15px">
          Entrar
        </button>
      </form>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════
     APP SCREEN
═══════════════════════════════════════════ -->
<div id="app-screen">
  <div class="app-layout">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-logo" id="sidebar-logo"></div>
      <nav class="sidebar-nav" id="sidebar-nav"></nav>
      <div class="sidebar-user" id="sidebar-user"></div>
    </aside>

    <!-- Main -->
    <main class="main-content">
      <div id="page-content"></div>
    </main>

  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script src="js/app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {})
  }
</script>
</body>
</html>
